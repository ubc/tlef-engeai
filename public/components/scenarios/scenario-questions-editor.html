    <div id="sg-instructor-editor-view" class="sg-instructor-editor-view" data-artefact-inline style="display: none;">
        <button id="sg-instructor-editor-back-btn" class="sg-instructor-topic-detail-back-btn" type="button">
            <i data-feather="arrow-left"></i>
            <span id="sg-instructor-editor-back-label"></span>
        </button>

        <div class="sg-instructor-editor-layout">
            <main class="sg-instructor-editor-main">
                <header class="sg-instructor-editor-page-header">
                    <div class="sg-instructor-editor-title-row">
                        <h1 id="sg-instructor-editor-title-display" class="sg-instructor-page-title sg-instructor-editor-title" tabindex="0" role="button" aria-label="Edit question title"></h1>
                        <input id="sg-instructor-editor-title-input" class="sg-instructor-editor-title-input sg-instructor-page-title sg-instructor-editor-title" type="text" aria-label="Question title" style="display: none;" />
                        <button id="sg-instructor-editor-title-edit-btn" type="button" class="sg-instructor-editor-title-edit-btn" aria-label="Edit question title">
                            <i data-feather="edit-2"></i>
                        </button>
                    </div>
                </header>

                <div class="sg-instructor-editor-section sg-instructor-base-question-panel">
                    <div class="sg-instructor-section-header-row">
                        <span class="sg-instructor-editor-section-label">Base question</span>
                        <div class="sg-instructor-view-toggle sg-instructor-base-question-toggle" role="group" aria-label="Base question view mode">
                            <button type="button" class="sg-instructor-view-toggle-btn sg-instructor-base-question-toggle-btn sg-instructor-view-toggle-btn--active" data-mode="edit">Edit</button>
                            <button type="button" class="sg-instructor-view-toggle-btn sg-instructor-base-question-toggle-btn" data-mode="preview">Preview</button>
                        </div>
                    </div>
                    <div class="sg-instructor-base-question-body">
                        <label class="sg-instructor-sr-only" for="sg-instructor-editor-question-body">Base question</label>
                        <textarea id="sg-instructor-editor-question-body" class="sg-instructor-editor-textarea sg-instructor-editor-textarea--large" rows="6"></textarea>
                        <div id="sg-instructor-editor-question-rendered" class="sg-instructor-markdown-preview message-content" hidden></div>
                    </div>
                </div>

                <div id="sg-instructor-editor-parts" class="sg-instructor-editor-parts">
                    <!-- Subquestion cards rendered by TS -->
                </div>

                <p id="sg-instructor-editor-error" class="sg-instructor-form-error" style="display: none;"></p>
            </main>

            <div class="sg-instructor-editor-side">
            <aside class="sg-instructor-editor-meta">
                <div class="sg-instructor-editor-meta-header">
                    <button id="sg-instructor-editor-save-btn" type="button" class="sg-instructor-save-btn" disabled>Save</button>
                </div>

                <div class="sg-instructor-meta-field">
                    <span class="sg-instructor-meta-label">Topic</span>
                    <p id="sg-instructor-editor-topic-label" class="sg-instructor-meta-value"></p>
                </div>

                <div class="sg-instructor-meta-field">
                    <span class="sg-instructor-meta-label">Learning objectives</span>
                    <div id="sg-instructor-editor-lo-list" class="sg-instructor-lo-list" aria-live="polite"></div>
                    <button id="sg-instructor-editor-lo-manage-btn" type="button" class="sg-instructor-lo-manage-btn">Manage objectives</button>
                </div>

                <div class="sg-instructor-meta-field sg-instructor-meta-field--time">
                    <span class="sg-instructor-meta-label">Expected Time</span>
                    <button id="sg-instructor-editor-expected-time-btn" type="button" class="sg-instructor-expected-time-btn" aria-haspopup="dialog" aria-controls="sg-instructor-time-modal-overlay">
                        <span id="sg-instructor-editor-expected-time" class="sg-instructor-expected-time" data-seconds="1500">25:00</span>
                        <span class="sg-instructor-expected-time-edit-label">Edit</span>
                    </button>
                </div>

                <div class="sg-instructor-editor-meta-actions">
                    <div class="sg-instructor-status-wrap sg-instructor-editor-status-wrap">
                        <button id="sg-instructor-editor-status-btn" type="button" class="sg-instructor-status-pill sg-instructor-status-pill-draft sg-instructor-status-menu-btn" aria-haspopup="listbox" aria-expanded="false">
                            <span id="sg-instructor-editor-status-label">Draft</span>
                        </button>
                        <div id="sg-instructor-editor-status-menu" class="sg-instructor-status-menu" style="display: none;" role="listbox" aria-label="Question status">
                            <button type="button" class="sg-instructor-status-menu-option sg-instructor-status-menu-option-draft" data-status="draft">Draft</button>
                            <button type="button" class="sg-instructor-status-menu-option sg-instructor-status-menu-option-published" data-status="published">Published</button>
                        </div>
                    </div>
                    <button id="sg-instructor-editor-delete-btn" type="button" class="sg-instructor-status-pill sg-instructor-delete-pill sg-instructor-status-menu-btn" aria-label="Delete question">
                        <i data-feather="trash-2"></i>
                        <span>Delete question</span>
                    </button>
                </div>
            </aside>
            <p class="sg-instructor-flashcard-help">
                Not sure how to format answer cards?
                <button type="button" id="sg-instructor-flashcard-help-btn" class="sg-instructor-flashcard-help-link">Click here</button>
            </p>
            </div>
        </div>
    </div>
