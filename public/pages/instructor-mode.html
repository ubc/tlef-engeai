<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngE-AI | Instructor Mode</title>

     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/instructor-mode.css">
    <link rel="stylesheet" href="/styles/chat-components/welcome-screen.css">
    <link rel="stylesheet" href="/styles/chat-components/artefact.css">
    <link rel="stylesheet" href="/styles/chat-components/unstruggle.css">
    <link rel="stylesheet" href="/styles/modal-overlay.css">
    <link rel="stylesheet" href="/styles/instructor-components/catalog-modal.css">
    <link rel="stylesheet" href="/styles/instructor-components/documents.css">
    <link rel="stylesheet" href="/styles/instructor-components/monitor-instructor.css">
    <link rel="stylesheet" href="/styles/chat-components/latex-rendering.css">
    <link rel="stylesheet" href="/styles/chat-components/chat-feature.css">
    <link rel="stylesheet" href="/styles/chat-components/disclaimer.css">
    <link rel="stylesheet" href="/styles/about.css">
    <link rel="stylesheet" href="/styles/toast-notification.css">
    
    
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <!-- @rdschrs: Added accessible, capability-gated Writing Feedback navigation to this shell. -->
    <a class="skip-link" href="#main-content-area">Skip to main content</a>
    <!-- Sidebar overlay for mobile - click to close sidebar -->
    <div id="instructor-sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
    <div class="main-dashboard">
        <aside class="instructor-sidebar" aria-label="Instructor workspace navigation">
            <div class="instructor-feature-sidebar">
                <div class="sidebar-main-content" >
                    <div class="logo-box">
                        <i data-feather="box"></i>
                        <div class="logo-text">
                            <span>EngE-AI</span>
                            <p>Instructor Mode</p>
                        </div>
                    </div>
                    <button class="sidebar-collapse-icon" aria-label="Toggle sidebar">
                        <i data-feather="menu"></i>
                    </button>
                    <div class="sidebar-content" id="sidebar-content">
                        <div class="sidebar-menu-list">
                            <ul>
                                <li><button id="documents-state" class="menu-list-item" type="button">
                                    <i data-feather="file-text" aria-hidden="true"></i>
                                    <p>Document</p>
                                </button></li>
                                <li><button id="writing-feedback-state" class="menu-list-item" type="button" hidden>
                                    <i data-feather="edit-3" aria-hidden="true"></i>
                                    <p>Writing Feedback</p>
                                </button></li>
                                <li><button id="chat-state" class="menu-list-item" type="button">
                                    <i data-feather="message-circle" aria-hidden="true"></i>
                                    <p>Chat with EngE-AI</p>
                                </button></li>
                                <li><button id="flag-state" class="menu-list-item" type="button">
                                    <i data-feather="alert-triangle" aria-hidden="true"></i>
                                    <p>Flags</p>
                                </button></li>
                                <li><button id="monitor-state" class="menu-list-item" type="button">
                                    <i data-feather="monitor" aria-hidden="true"></i>
                                    <p>Monitor</p>
                                </button></li>
                                <li><button id="assistant-prompts-state" class="menu-list-item" type="button">
                                    <i data-feather="message-square" aria-hidden="true"></i>
                                    <p>Initial Assistant Prompt</p>
                                </button></li>
                                <li><button id="system-prompts-state" class="menu-list-item" type="button">
                                    <i data-feather="settings" aria-hidden="true"></i>
                                    <p>System Prompt</p>
                                </button></li>
                            </ul>
                        </div>
                    </div>
                </div>
                
                <!-- Sidebar Footer with Logout Button - INSIDE instructor-feature-sidebar -->
                <div class="instructor-sidebar-footer">
                    <button class="instructor-course-info-btn" id="instructor-course-info-btn">
                        <i data-feather="settings"></i>
                        <p>Course Information</p>
                    </button>
                    <button class="instructor-about-btn" id="instructor-about-btn">
                        <i data-feather="info"></i>
                        <p>About</p>
                    </button>   
                    <button class="instructor-course-selection-btn" id="instructor-course-selection-btn">
                        <i data-feather="book-open"></i>
                        <p>Course Selection</p>
                    </button>
                    <button class="instructor-logout-btn" id="instructor-logout-btn">
                        <i data-feather="log-out"></i>
                        <p>Log Out</p>
                    </button>
                </div>
            </div>

            
            <!-- Chat menu component - INSIDE instructor-sidebar, OUTSIDE instructor-feature-sidebar YUHUUUUU  -->
            <div class="chat-list" id="chat-list">
                <div class="add-chat-box">
                    <button class="add-chat-btn" id="add-chat-btn">
                        <span>+ add new chat</span>
                    </button>
                </div>
                <ul id="chat-list-ul" class="chat-list-ul">
                    <!-- Chat items will be rendered here by ChatManager -->
                </ul>
            </div>
            
        </aside>
        <main id="main-content-area" tabindex="-1">
            <!-- content will be populated here -->
        </main>

        <button type="button" class="course-summary-summon-fab course-summary-fab-hidden" id="course-summary-summon-fab" aria-label="Open course summary">
            <i data-feather="pie-chart"></i>
        </button>
    </div>

    

    
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
    
    <!-- KaTeX JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script type="module" src="/dist/public/scripts/entry/instructor-mode.js"></script>
    <script>
        feather.replace(); // Initialize Feather Icons
    </script>
</body>
</html>
