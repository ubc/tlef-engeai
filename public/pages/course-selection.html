<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EngE-AI - Course Selection</title>
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/course-selection.css">
    <link rel="stylesheet" href="/styles/modal-overlay.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="top-branding">
        <div class="branding-content">
            <div class="brand-logo">
                <i data-feather="box"></i>
                <span>TLEF EngE-AI</span>
            </div>
            <div class="top-branding-right">
                <span class="welcome-text">Welcome, <span id="user-name"></span></span>
                <button class="logout-btn" id="logout-btn" aria-label="Logout" title="Logout">
                    <i data-feather="log-out"></i>
                    <span class="btn-text">Logout</span>
                </button>
            </div>
        </div>
    </div>

    <div class="course-selection-wrapper">
        <div id="period-sections" class="period-sections" aria-live="polite"></div>

        <div class="empty-state" id="empty-state" style="display: none;">
            <div class="empty-state-content">
                <i data-feather="book-open"></i>
                <h2>No academic periods</h2>
                <p id="empty-state-message">No academic periods are configured yet. Please contact your instructor or administrator.</p>
            </div>
        </div>

        <div class="loading-message" id="loading-message">
            <div class="spinner"></div>
            <p>Loading available courses...</p>
        </div>

        <div class="error-message" id="error-message" style="display: none;">
            <p>Unable to load courses. Please try again.</p>
            <button id="retry-btn" class="retry-btn">Retry</button>
        </div>
    </div>

    <button
        type="button"
        id="seed-report-fixture-btn"
        class="seed-report-fixture-btn seed-fixture-hidden"
        aria-label="Seed Test 3 report fixture"
        title="Seed Test 3 report fixture (destructive)"
    >
        <i data-feather="database"></i>
    </button>
    <input
        type="file"
        id="seed-report-fixture-file"
        accept=".json,application/json"
        hidden
    />

    <script>
        feather.replace();
    </script>
    <script type="module" src="/dist/public/scripts/entry/course-selection.js"></script>
</body>
</html>
